name: Adagio
options:
  bundleIdPrefix: com.adagio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""            # set your Team ID for signing, or leave blank for local run
    CODE_SIGN_STYLE: Automatic

targets:
  Adagio:
    type: application
    platform: macOS
    sources:
      - path: Adagio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adagio.recorder
        INFOPLIST_FILE: Adagio/Info.plist
        CODE_SIGN_ENTITLEMENTS: Adagio/Adagio.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
